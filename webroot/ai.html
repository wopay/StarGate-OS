<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 算力集群管理 (躯壳机房)</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-panel: #161719;
            --text-main: #e8e8e8;
            --text-muted: #888;
            --accent-color: #a8c7fa;
            --accent-cyan: #20c997;
            --danger-color: #ff6b6b;
        }

        body { display: flex; flex-direction: column; height: 100dvh; background-color: var(--bg-dark); overflow: hidden; margin: 0; font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; }
        
        /* 绝对置顶且永不错位的 Header */
        .fixed-header { 
            background: var(--bg-panel); padding: 0.8rem 1.2rem; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 1000;
        }
        
        .header-left { display: flex; align-items: center; gap: 12px; }
        .back-btn { display: flex; align-items: center; justify-content: center; background: #2a2b2d; color: var(--accent-color); width: 36px; height: 36px; border-radius: 50%; text-decoration: none; transition: 0.2s; }
        .back-btn:active { transform: scale(0.9); }
        .header-title { margin: 0; font-size: 1.1rem; color: #fff; font-weight: bold; letter-spacing: 1px;}
        
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end;}
        .btn-dna { background: rgba(32, 201, 151, 0.1); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 0 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; height: 36px; text-decoration: none;}
        .btn-probe { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); padding: 0 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; height: 36px;}
        .btn-save { background: linear-gradient(135deg, #a8c7fa 0%, #d8b4fe 100%); color: #111; border: none; padding: 0 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; height: 36px; box-shadow: 0 2px 10px rgba(168,199,250,0.3);}
        .btn-engineer { background: rgba(255, 107, 107, 0.1); border: 1px solid var(--danger-color); color: var(--danger-color); padding: 0 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; height: 36px;}
        
        .btn-save:active, .btn-probe:active, .btn-dna:active, .btn-engineer:active { transform: scale(0.95); }

        .scroll-container { flex: 1; overflow-y: auto; padding: 1.5rem 1rem 5rem 1rem; position: relative;}

        /* ======== 文件夹 (机架) 体系 ======== */
        .category-group { margin-bottom: 1rem; border-radius: 16px; border: 1px solid #333; overflow: hidden; transition: 0.3s; background: rgba(255,255,255,0.01);}
        .category-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 16px; background: linear-gradient(to right, rgba(30,31,32,1) 0%, rgba(40,41,43,1) 100%); 
            cursor: pointer; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222;
        }
        
        .cat-title-area { display: flex; align-items: center; gap: 8px; flex: 1; }
        .collapse-icon { color: #888; font-size: 0.9rem; transition: transform 0.3s; width: 20px; text-align: center;}
        .category-title-input { background: transparent; border: none; color: var(--accent-color); font-size: 1rem; font-weight: bold; flex: 1; outline: none; padding: 6px; pointer-events: auto; width: 100%;}
        .category-title-input:focus { background: rgba(0,0,0,0.4); border-radius: 6px;}
        
        .cat-actions { display: flex; gap: 8px; align-items: center; }
        .btn-add-node { background: #333; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; pointer-events: auto;}
        .btn-del-cat { background: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; pointer-events: auto;}
        
        .category-group.collapsed .collapse-icon { transform: rotate(-90deg); }
        .category-group.collapsed .ai-list { display: none; }
        .category-group.collapsed .category-header { border-bottom: none; }

        .ai-list { display: flex; flex-direction: column; gap: 1rem; padding: 1.2rem 1rem; }

        /* ======== 节点卡片 ======== */
        .ai-node-card { 
            background: var(--bg-panel); border: 1px solid #444; 
            border-radius: 12px; padding: 1.2rem; position: relative;
            display: flex; flex-direction: column; gap: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .ai-node-card.advanced { border-left: 4px solid #d8b4fe; } 
        .ai-node-card.disabled { opacity: 0.5; filter: grayscale(100%); }

        .card-top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #333; padding-bottom: 0.8rem; }
        .sort-controls { display: flex; align-items: center; gap: 4px; background: #000; border-radius: 20px; padding: 4px 8px; border: 1px solid #333;}
        .sort-btn { background: transparent; border: none; color: var(--accent-color); font-size: 1rem; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%;}
        .sort-btn:active { background: rgba(168,199,250,0.2); }
        .sort-btn:disabled { color: #444; pointer-events: none; }
        .sort-num { color: #aaa; font-size: 0.8rem; font-weight: bold; min-width: 24px; text-align: center; }

        .btn-del-node { background: transparent; color: var(--danger-color); border: none; cursor: pointer; font-size: 1.2rem; padding: 4px; }
        
        .node-identity { display: flex; gap: 15px; align-items: flex-start; }
        .icon-preview { width: 56px; height: 56px; background: #000; border-radius: 10px; border: 1px solid #555; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; overflow: hidden; flex-shrink: 0;}
        .icon-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .identity-inputs { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .node-name-input { background: rgba(0,0,0,0.4); border: 1px solid #444; color: #fff; font-size: 1.05rem; font-weight: bold; width: 100%; outline: none; padding: 10px; border-radius: 8px; box-sizing: border-box;}
        .node-name-input:focus { border-color: var(--accent-color); }
        .node-icon-input { background: rgba(0,0,0,0.4); border: 1px solid #444; color: #aaa; width: 100%; outline: none; padding: 8px 10px; border-radius: 6px; box-sizing: border-box; font-size: 0.85rem;}

        .switch-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid #333;}
        .switch-label { font-size: 0.85rem; font-weight: bold; color: #ddd; }
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #4caf50; }
        input:checked + .slider:before { transform: translateX(24px); }

        /* ======== 大师级 CSS Grid 架构 ======== */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-item.full-width { grid-column: 1 / -1; }
        
        .form-item { display: flex; flex-direction: column; gap: 6px; }
        .form-item label { color: var(--text-muted); font-size: 0.75rem; font-weight: bold; padding-left: 2px;}
        .form-item > input, .custom-select { 
            background: #000; border: 1px solid #444; color: var(--text-main); 
            padding: 12px; border-radius: 8px; outline: none; font-size: 0.9rem; 
            width: 100%; box-sizing: border-box; transition: 0.2s;
        }
        .form-item > input:focus, .custom-select:focus { border-color: var(--accent-color); }
        .custom-select { appearance: auto; padding: 10px 12px; }

        /* 💡 极客级工业 UI 参数组 */
        .param-group { 
            display: flex; align-items: center; background: #000; border: 1px solid #444; 
            border-radius: 8px; padding-right: 12px; transition: 0.2s; overflow: hidden; box-sizing: border-box; width: 100%;
        }
        .param-group:focus-within { border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(168,199,250,0.1); }
        .param-group input { border: none !important; border-radius: 0; outline: none; flex: 1; color: var(--text-main); padding: 12px; font-size: 0.9rem; background: transparent !important;}
        .param-unit { font-size: 0.75rem; color: #666; font-family: monospace; white-space: nowrap; user-select: none; font-weight: bold;}
        
        /* 💡 状态分离与解耦的高级面板 */
        .adv-panel { grid-column: 1 / -1; display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
        .adv-toggle-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; color: #aaa;
            font-size: 0.8rem; cursor: pointer; border: 1px dashed #444; transition: 0.2s; font-weight: bold;
            user-select: none;
        }
        .adv-toggle-btn:hover { color: var(--accent-color); border-color: var(--accent-color); background: rgba(255,255,255,0.08); }
        .adv-toggle-btn svg { transition: transform 0.3s; }
        .adv-panel.open .adv-toggle-btn svg { transform: rotate(180deg); }
        .adv-panel.open .adv-toggle-btn { border-color: var(--accent-color); color: var(--accent-color); }
        
        .adv-panel-content {
            display: none; grid-template-columns: 1fr 1fr; gap: 12px;
            padding: 16px; background: rgba(0,0,0,0.3); border-radius: 10px; border: 1px solid #333;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .adv-panel.open .adv-panel-content { display: grid; }
        .adv-panel-content .form-item.full-width { grid-column: 1 / -1; }

        .form-item textarea { 
            background: #000; border: 1px solid #444; color: var(--accent-color); 
            padding: 10px; border-radius: 8px; outline: none; font-size: 0.85rem; 
            width: 100%; box-sizing: border-box; resize: vertical; 
            min-height: 40px; font-family: monospace; transition: 0.2s;
        }
        .form-item textarea:focus { border-color: var(--accent-color); color: #fff;}

        .badge-advanced { background: rgba(216, 180, 254, 0.1); color: #d8b4fe; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; border: 1px solid rgba(216, 180, 254, 0.3); display: inline-block; margin-bottom: 6px; font-weight: bold;}

        .btn-magic { background: rgba(216, 180, 254, 0.15); border: 1px solid #d8b4fe; color: #d8b4fe; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-magic:hover { background: #d8b4fe; color: #000; }

        .add-cat-bottom {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(255,255,255,0.05); border: 1px dashed #555; color: #aaa;
            padding: 16px; border-radius: 12px; font-size: 0.9rem; font-weight: bold;
            cursor: pointer; transition: 0.2s; margin-top: 1rem;
        }
        .add-cat-bottom:active { background: rgba(255,255,255,0.1); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #4caf50; color: white; padding: 12px 24px; border-radius: 30px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2000; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}

        /* 通用模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-panel); width: 90%; max-width: 450px; border-radius: 16px; padding: 24px; border: 1px solid #555; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-height: 85vh; display: flex; flex-direction: column;}
        
        .engineer-chat-box { flex: 1; background: #000; border: 1px inset #444; border-radius: 8px; padding: 12px; overflow-y: auto; margin-bottom: 15px; font-family: monospace; font-size: 0.85rem; color: #a8c7fa; line-height: 1.5; white-space: pre-wrap; min-height: 200px; }
        .pulse-text { animation: pulse 1.5s infinite; color: #d8b4fe; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        /* 💡 移动端自适应空间折叠 (坍缩为 1fr) */
        @media (max-width: 600px) {
            .header-actions { justify-content: flex-start; }
            .form-grid { grid-template-columns: 1fr; }
            .adv-panel-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="fixed-header">
        <div class="header-left">
            <a href="/" class="back-btn" title="返回主控台">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </a>
            <h2 class="header-title">算力集群 (躯壳)</h2>
        </div>
        <div class="header-actions">
            <button class="btn-engineer" onclick="openEngineerConfigModal()" title="专属隔离的第三AI">🧠 驻场工程师</button>
            <a href="/dna.html" class="btn-dna" title="前往基因组装库">🧬 DNA库</a>
            <button class="btn-probe" onclick="openProbeModal()">📡 探测</button>
            <button class="btn-save" onclick="saveAllConfigs()">保存机房</button>
        </div>
    </div>

    <div class="scroll-container">
        <div style="background: rgba(32,201,151,0.05); border: 1px solid rgba(32,201,151,0.3); border-radius: 8px; padding: 12px; margin-bottom: 15px; color: #aaa; font-size: 0.8rem;">
            💡 <b>架构升级说明 (V3.0)</b>：当前面板仅管理大模型的“纯净物理躯壳”（URL、Key、出厂参数）。长篇的业务规则和 SOP 请移步至 <a href="/dna.html" style="color:var(--accent-cyan); font-weight:bold;">🧬 DNA 基因库</a> 进行管理组装。遇到难题？点击机床旁的 <b>✨ AI 智能装配</b> 呼叫驻场工程师。
        </div>

        <div class="settings-container" id="categories-container"></div>
        
        <div class="settings-container" style="padding-top: 0;">
            <div class="add-cat-bottom" onclick="addCategory()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                新增算力机架
            </div>
        </div>
    </div>

    <div id="probeModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#d8b4fe; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14l6-6 4 4 6-6"/></svg>
                探测高级节点
            </h3>
            <p style="font-size:0.8rem; color:#888; margin-bottom: 20px; line-height: 1.4;">系统将向该网关发送探针，自动拉取并建组所有可用大模型躯壳。</p>
            <div class="form-item" style="margin-bottom:15px;">
                <label>API Base URL</label>
                <input type="text" id="probe-url" placeholder="https://api.yourproxy.com/v1" style="background:#000;">
            </div>
            <div class="form-item" style="margin-bottom:25px;">
                <label>API Key</label>
                <input type="password" id="probe-key" placeholder="sk-..." style="background:#000;">
            </div>
            <div style="display:flex; justify-content:space-between; gap:15px;">
                <button class="btn-del-cat" style="flex:1; padding:12px; border-radius:8px;" onclick="closeProbeModal()">取消</button>
                <button class="btn-save" style="flex:2; padding:12px; height:auto; justify-content:center; border-radius:8px;" id="probe-confirm-btn" onclick="executeProbe()">🚀 开始探测</button>
            </div>
        </div>
    </div>

    <div id="engineerConfigModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--danger-color); font-size: 1.1rem; display: flex; align-items: center; gap: 8px;">
                🧠 驻场工程师 (算力指派)
            </h3>
            <p style="font-size:0.8rem; color:#888; margin-bottom: 20px; line-height: 1.4;">系统已打通内循环。请直接从您的机房中选择一台高阶算力机床，让它为您提供专属辅助。</p>
            <div class="form-item" style="margin-bottom:25px;">
                <label>选择用来辅助装配的主脑</label>
                <select id="eng-vendor-select" class="custom-select" style="margin-top: 8px;">
                </select>
            </div>
            <div style="display:flex; justify-content:space-between; gap:15px;">
                <button class="btn-del-cat" style="flex:1; padding:12px; border-radius:8px;" onclick="closeEngineerConfigModal()">取消</button>
                <button class="btn-save" style="flex:2; padding:12px; height:auto; justify-content:center; border-radius:8px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #000;" onclick="saveEngineerConfig()">💾 锁定并授权</button>
            </div>
        </div>
    </div>

    <div id="engineerChatModal" class="modal">
        <div class="modal-content" style="max-width: 600px; height: 80vh;">
            <h3 style="margin-top:0; color:#d8b4fe; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
                ✨ AI 智能进化诊断舱
            </h3>
            <p style="font-size:0.8rem; color:#888; margin-bottom: 10px; line-height: 1.4; flex-shrink: 0;">正在为机床 <b id="eng-target-node" style="color:#fff;"></b> 生成专属 DNA 图纸...</p>
            
            <div id="eng-chat-output" class="engineer-chat-box"></div>

            <div style="display:flex; justify-content:flex-end; gap:15px; flex-shrink: 0;">
                <button class="btn-del-cat" style="padding:10px 20px; border-radius:8px;" onclick="closeEngineerChatModal()">关闭诊断舱</button>
                <a href="/dna.html" target="_blank" class="btn-save" style="padding:10px 20px; height:auto; justify-content:center; border-radius:8px;">前往 DNA 库贴入图纸 🧬</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">✅ 操作成功！</div>

    <script>
        // 💡 核心防御：防注入保护，绝对防止渲染致盲
        function safeJsString(str) {
            if (!str) return '';
            return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        let configData = [];
        let hiddenSystemPromptsData = {}; 
        let originalAiConfig = {}; 

        async function loadConfigs() {
            try {
                const res = await fetch('/api/config/ai');
                if (res.ok) {
                    const data = await res.json();
                    originalAiConfig = data; 
                    
                    if (data.categories && data.categories.length > 0) {
                        configData = data.categories;
                    } else if (data.vendors && data.vendors.length > 0) {
                        configData = [{ id: 'cat_default', name: '默认机架', collapsed: true, nodes: data.vendors }];
                    }
                    if (data.system_prompts) {
                        hiddenSystemPromptsData = data.system_prompts;
                    }
                }
            } catch (e) { console.error("加载配置失败", e); }
            
            if (configData.length === 0) {
                configData = [{ id: 'cat_' + Date.now(), name: '通用算力池', collapsed: false, nodes: [] }];
            }
            
            configData.forEach(c => { if(c.collapsed === undefined) c.collapsed = true; });
            if(configData.length === 1) configData[0].collapsed = false;

            renderAll();
        }

        let autoSaveTimeout = null;
        function triggerAutoSave() {
            const btn = document.querySelector('.btn-save');
            if(btn) btn.innerHTML = "⏳ 保存中...";
            if (autoSaveTimeout) clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => { saveAllConfigs(true); }, 800);
        }

        function addCategory() { configData.push({ id: 'cat_' + Date.now(), name: '新建算力机架', collapsed: false, nodes: [] }); renderAll(); triggerAutoSave(); setTimeout(() => { const scrollEl = document.querySelector('.scroll-container'); scrollEl.scrollTo({top: scrollEl.scrollHeight, behavior: 'smooth'}); }, 100); }
        function delCategory(e, catId) { e.stopPropagation(); if (confirm('🚨 警告：确定要拆除该机架及其挂载的所有算力节点吗？')) { configData = configData.filter(c => c.id !== catId); renderAll(); triggerAutoSave(); } }
        function toggleCategory(catId) { const cat = configData.find(c => c.id === catId); if (cat) { cat.collapsed = !cat.collapsed; renderAll(); } } 
        function addNodeToCategory(e, catId) { e.stopPropagation(); const cat = configData.find(c => c.id === catId); if (cat) { cat.collapsed = false; cat.nodes.unshift({ id: 'ai_' + Date.now(), name: '新空白克隆人', icon: '🤖', url: '', key: '', exec_mode: 'api', cli_cmd: 'gemini', cli_args: '', isAdvanced: false, enabled: true, remark: '纯净算力底座', is_agentic: false, fallback_id: '', base_prompt: '你是一个纯净的黑灯工厂底层算力节点。请严格服从后续注入的 DNA 规则。' }); renderAll(); triggerAutoSave(); } }
        function delNode(catId, nodeId) { if (confirm('确定从机架拔出此节点吗？')) { const cat = configData.find(c => c.id === catId); if (cat) { cat.nodes = cat.nodes.filter(n => n.id !== nodeId); renderAll(); triggerAutoSave(); } } }

        // ==========================================
        // 驻场工程师逻辑
        // ==========================================
        function getFlatVendors() {
            let flat = [];
            configData.forEach(cat => {
                cat.nodes.forEach(n => { if(n.enabled !== false) flat.push(n); });
            });
            return flat;
        }

        function openEngineerConfigModal() {
            const flatVendors = getFlatVendors();
            const selectEl = document.getElementById('eng-vendor-select');
            
            selectEl.innerHTML = flatVendors.map(v => 
                `<option value="${v.id}">${safeJsString(v.name)} ${v.isAdvanced ? '(🌌 聚合/高级)' : ''}</option>`
            ).join('');

            if (flatVendors.length === 0) {
                selectEl.innerHTML = `<option value="">⚠️ 暂无可用算力，请先添加节点</option>`;
            }

            const savedVendorId = localStorage.getItem('dna_engineer_vendor_id');
            if (savedVendorId && flatVendors.some(v => v.id === savedVendorId)) {
                selectEl.value = savedVendorId;
            } else {
                const advNode = flatVendors.find(v => v.isAdvanced);
                if (advNode) selectEl.value = advNode.id;
            }
            
            document.getElementById('engineerConfigModal').classList.add('show');
        }
        
        function closeEngineerConfigModal() { document.getElementById('engineerConfigModal').classList.remove('show'); }
        
        function saveEngineerConfig() {
            const vendorId = document.getElementById('eng-vendor-select').value;
            if(!vendorId) { alert("请先配置一个可用的算力节点！"); return; }
            localStorage.setItem('dna_engineer_vendor_id', vendorId);
            closeEngineerConfigModal();
            showToast("🧠 驻场算力已锁定并授权！");
        }

        function closeEngineerChatModal() { document.getElementById('engineerChatModal').classList.remove('show'); }

        async function askDNAEngineer(catId, nodeId) {
            const savedVendorId = localStorage.getItem('dna_engineer_vendor_id');
            const flatVendors = getFlatVendors();
            let chiefPhysician = null;
            
            if (savedVendorId) chiefPhysician = flatVendors.find(v => v.id === savedVendorId);
            if (!chiefPhysician) {
                chiefPhysician = flatVendors.find(v => v.isAdvanced && v.key);
                if (!chiefPhysician && flatVendors.length > 0) chiefPhysician = flatVendors[0];
            }

            if (!chiefPhysician || !chiefPhysician.url || !chiefPhysician.key) {
                alert("⚠️ 请先点击右上角的【🧠 驻场通道】选择并授权一台可用的机床作为主脑！");
                openEngineerConfigModal();
                return;
            }

            const node = configData.find(c => c.id === catId).nodes.find(n => n.id === nodeId);
            if(!node) return;

            document.getElementById('eng-target-node').innerText = `[${node.name}]`;
            const outBox = document.getElementById('eng-chat-output');
            outBox.innerHTML = '<div class="pulse-text">📡 正在向驻场工程师发送机床特征，分析评估中...</div>';
            document.getElementById('engineerChatModal').classList.add('show');

            const sysPrompt = `你是一个顶级的黑灯工厂DNA系统架构师。你的任务是根据用户提供的【机床特征】，为该机床生成一套全新的 DNA 装配方案。
要求：
1. 语言极简，科幻工业风。绝对禁止说废话、打招呼。
2. 请直接给出该机床需要的 Identity (认知人格)、SOP (业务工序) 和 Rule (致命红线) 的详细文本草案。
3. 文本排版清晰，方便厂长直接复制粘贴到 dna.html 中。`;

            const userPrompt = `请求分析目标机床。
机床名称：${node.name}
算力特征描述：${node.remark || '无'}
当前的基础意识流：${node.base_prompt || '无'}

请为我设计一套全新的 PRESET 职业套装，以及它配套的 SOP 和红线。`;

            try {
                const endpoint = chiefPhysician.url.endsWith('/completions') ? chiefPhysician.url : `${chiefPhysician.url.replace(/\/$/, '')}/chat/completions`;

                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${chiefPhysician.key}` },
                    body: JSON.stringify({
                        model: chiefPhysician.name, 
                        messages: [
                            { role: "system", content: sysPrompt },
                            { role: "user", content: userPrompt }
                        ],
                        temperature: 0.7
                    })
                });

                if(!res.ok) throw new Error(`HTTP ${res.status} - 接口拒绝响应`);
                const data = await res.json();
                const reply = data.choices[0].message.content;
                
                outBox.innerHTML = reply.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
            } catch (error) {
                outBox.innerHTML = `<span style="color:#ff6b6b;">❌ 驻场工程师连接中断：${error.message}</span>\n请检查右上角的专属通道配置是否正确，或检查跨域拦截。`;
            }
        }

        // ==========================================
        // 核心落盘逻辑
        // ==========================================
        async function saveAllConfigs(isAuto = false) {
            try {
                const activeVendors = [];
                configData.forEach(cat => {
                    cat.nodes.forEach(node => {
                        if (node.enabled !== false) {
                            // 💡 架构师级除颤：落盘时绝对尊重厂长的留空指令，彻底抹杀 {{PRESET_BASE_CLI}} 污染
                            let finalPrompt = "";
                            if (node.base_prompt !== undefined && node.base_prompt !== null) {
                                finalPrompt = node.base_prompt;
                            } else if (node.system_prompt !== undefined && node.system_prompt !== null) {
                                finalPrompt = node.system_prompt;
                            } else {
                                finalPrompt = "你是一个纯净的黑灯工厂底层算力节点。请严格服从后续注入的 DNA 规则。";
                            }
                            
                            let t = node.temperature !== undefined && node.temperature !== null && node.temperature !== '' ? parseFloat(node.temperature) : null;
                            let p = node.top_p !== undefined && node.top_p !== null && node.top_p !== '' ? parseFloat(node.top_p) : null;
                            let m = node.max_tokens ? parseInt(node.max_tokens) : null;
                            let penalty = node.presence_penalty !== undefined && node.presence_penalty !== null && node.presence_penalty !== '' ? parseFloat(node.presence_penalty) : null;
                            
                            // 提取狙击手阈值
                            let fs = node.force_stop !== undefined && node.force_stop !== null && node.force_stop !== '' ? parseInt(node.force_stop) : null;
                            let pl = node.purge_limit !== undefined && node.purge_limit !== null && node.purge_limit !== '' ? parseInt(node.purge_limit) : null;

                            activeVendors.push({
                                id: node.id, 
                                name: node.name, 
                                use_sandbox: !!node.use_sandbox, 
                                exec_mode: node.exec_mode || 'api', 
                                cli_cmd: node.cli_cmd !== undefined ? node.cli_cmd : 'gemini',
                                cli_args: node.cli_args || '',
                                force_stop: fs,                  
                                purge_limit: pl,                 
                                model_id: node.model_id || "", 
                                icon: node.icon, 
                                url: node.url, 
                                key: node.key, 
                                remark: node.remark,
                                is_agentic: !!node.is_agentic,
                                fallback_id: node.fallback_id || "",
                                base_prompt: finalPrompt, 
                                system_prompt: finalPrompt,
                                temperature: t,
                                top_p: p,
                                max_tokens: m,
                                presence_penalty: penalty
                            });
                        }
                    });
                });
                
                const payload = { 
                    ...originalAiConfig, 
                    categories: configData, 
                    vendors: activeVendors, 
                    system_prompts: hiddenSystemPromptsData 
                };
                
                const res = await fetch('/api/config/ai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) {
                    originalAiConfig = payload; 
                    
                    const btn = document.querySelector('.btn-save');
                    if(btn) btn.innerHTML = "✅ 已保存";
                    setTimeout(() => { if(btn && btn.innerHTML === "✅ 已保存") btn.innerHTML = "保存机房"; }, 2000);
                    
                    if (!isAuto) showToast("✅ 算力配置已物理落盘 (无损模式)！");
                }
            } catch (e) { 
                const btn = document.querySelector('.btn-save');
                if(btn) btn.innerHTML = "❌ 保存失败";
                if (!isAuto) alert('保存失败，请检查网络'); 
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function openProbeModal() { document.getElementById('probeModal').classList.add('show'); }
        function closeProbeModal() { document.getElementById('probeModal').classList.remove('show'); }
        
        async function executeProbe() {
            const urlInput = document.getElementById('probe-url').value.trim();
            const keyInput = document.getElementById('probe-key').value.trim();
            if (!urlInput || !keyInput) return alert("请完整填写 URL 和 Key");
            const btn = document.getElementById('probe-confirm-btn');
            btn.innerText = "探测中..."; btn.disabled = true;
            try {
                let baseUrl = urlInput;
                if (baseUrl.endsWith('/chat/completions')) baseUrl = baseUrl.replace('/chat/completions', '');
                if (baseUrl.endsWith('/v1')) baseUrl = baseUrl.replace(/\/v1$/, '');
                if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);
                let fetchUrl = `${baseUrl}/v1/models`;
                let res = await fetch(fetchUrl, { method: 'GET', headers: { 'Authorization': `Bearer ${keyInput}`, 'Content-Type': 'application/json' }});
                if (!res.ok) {
                    fetchUrl = `${baseUrl}/models`;
                    res = await fetch(fetchUrl, { method: 'GET', headers: { 'Authorization': `Bearer ${keyInput}`, 'Content-Type': 'application/json' }});
                }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const models = data.data || data || [];
                if (!Array.isArray(models) || models.length === 0) {
                    alert('探测成功，但目标 API 未返回任何模型。');
                } else {
                    const newCat = {
                        id: 'cat_' + Date.now(), name: `聚合网关 (${new URL(baseUrl).hostname})`, collapsed: false, 
                        nodes: models.map((m, i) => ({
                            id: 'ai_adv_' + Date.now() + '_' + i, name: m.id, icon: '✨', url: urlInput, key: keyInput,
                            isAdvanced: true, enabled: true, remark: '探测拉取的外部算力', is_agentic: false, fallback_id: '',
                            base_prompt: '你是一个纯净的黑灯工厂底层算力节点。请严格服从后续注入的 DNA 规则。' 
                        }))
                    };
                    configData.unshift(newCat); renderAll(); closeProbeModal();
                    triggerAutoSave();
                    alert(`✅ 成功探测并挂载了 ${models.length} 个模型节点！`);
                }
            } catch (e) { alert('❌ 探测失败！\n原因：' + e.message); } finally { btn.innerHTML = "🚀 开始探测"; btn.disabled = false; }
        }

        loadConfigs();
    </script>
</body>
</html>
