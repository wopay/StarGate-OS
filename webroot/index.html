    <style>
        /* 增加一个呼吸灯动画供排队提示使用 */
        @keyframes pulse-queue {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }
        
        /* 新增：蓝紫色高亮呼吸灯，专供后台巡航使用 */
        @keyframes pulse-cruise {
            0% { box-shadow: 0 0 0 0 rgba(168, 199, 250, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(168, 199, 250, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 199, 250, 0); }
        }

        /* 👇 新增：AI 消息底部的高级操作栏与 TTS 按钮 */
        .msg-action-bar { display: flex; gap: 10px; margin-top: 10px; justify-content: flex-end; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 6px; }
        .msg-action-btn { background: transparent; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-weight: bold;}
        .msg-action-btn:hover { background: rgba(255,255,255,0.1); color: #eee; border-color: #666; }
        .msg-action-btn.playing { color: #20c997; border-color: #20c997; background: rgba(32,201,151,0.1); box-shadow: 0 0 10px rgba(32,201,151,0.2); }

        select#domain-selector, select#simple-wf-selector {
            -webkit-appearance: none; -moz-appearance: none; appearance: none; text-align: center;
        }
        select#domain-selector option, select#simple-wf-selector option {
            background: var(--bg-panel, #1e1f20); color: #fff; padding: 10px;
        }

        /* 👇 Gemini 风格极致优雅输入框 */
        .gemini-input-container {
            width: 100%;
            background-color: var(--bg-panel);
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            padding: 12px 16px 8px 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .gemini-input-container:focus-within {
            background-color: #242528;
            border-color: #555;
        }
        
        .gemini-textarea {
            width: 100%; background: transparent; border: none;
            color: var(--text-main, #eee); font-size: 1rem;
            outline: none; resize: none; max-height: 200px;
            line-height: 1.5; padding: 0; margin-bottom: 8px;
            overflow-y: auto;
        }
        .gemini-textarea::placeholder { color: #666; }

        .gemini-bottom-bar {
            display: flex; justify-content: space-between; align-items: center;
        }
        .gemini-left-actions, .gemini-right-actions {
            display: flex; align-items: center; gap: 8px;
        }

        .g-icon-btn {
            background: transparent; border: none; color: #aaa;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .g-icon-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .iq-selector-wrapper { position: relative; display: flex; align-items: center;}
        .iq-select {
            appearance: none; -webkit-appearance: none;
            background: transparent; border: none; color: #aaa;
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
            padding: 6px 24px 6px 14px; border-radius: 20px; transition: 0.2s;
            outline: none;
        }
        .iq-select:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .iq-select option { background: var(--bg-panel); color: #fff; }
        .iq-arrow {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            pointer-events: none; font-size: 0.6rem; color: #aaa;
        }

        .g-send-btn {
            background: #e3e3e3; color: #111; border: none;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .g-send-btn:hover { filter: brightness(0.8); transform: scale(1.05); }
        .g-send-btn:active { transform: scale(0.95); }

        /* 流水线挂载状态胶囊 */
        .inline-factory-badge {
            display: none; align-items: center; gap: 6px;
            background: rgba(255, 183, 77, 0.15); color: #ffb74d;
            border: 1px solid rgba(255,183,77,0.4); padding: 4px 12px;
            border-radius: 16px; font-size: 0.75rem; font-weight: bold;
        }
        .inline-factory-badge.factory-active { display: flex; animation: pulse-queue 2s infinite; }
        .inline-factory-badge .close-btn { color: #ffb74d; cursor: pointer; font-size: 1rem; margin-left: 2px; }
        .inline-factory-badge .close-btn:hover { color: #fff; }

        /* 👑 升级版管家控制台样式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-content {
            background: var(--bg-panel, #1e1f20); border: 1px solid #444;
            padding: 24px; border-radius: 16px; width: 340px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .modal-content h3 { margin-top: 0; color: #eee; font-size: 1.2rem; font-weight: bold; text-align: left; padding-bottom: 12px; border-bottom: 1px solid #333;}
        
        .console-section { background: rgba(0,0,0,0.2); padding: 16px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #333; text-align: left; }
        .console-section h4 { margin: 0 0 12px 0; color: #a8c7fa; font-size: 0.85rem; font-weight: normal; text-transform: uppercase; letter-spacing: 1px;}
        .console-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.9rem; color: #ccc; }
        .console-row:last-child { margin-bottom: 0; }
        
        .console-select { background: #111; border: 1px solid #555; color: #eee; padding: 4px 8px; border-radius: 6px; outline: none; font-size: 0.8rem;}
        .console-btn { background: #333; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .console-btn:hover { background: #555; }
        
        .mode-btn { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #555; background: #2a2b2d; color: #ccc; cursor: pointer; font-size: 0.85rem; transition: 0.2s; font-weight: bold; text-align: center;}
        .mode-btn.active { background: #d8b4fe; color: #111; border-color: #d8b4fe; }

        /* TTS 切换开关 */
        .toggle-switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #4caf50; }
        input:checked + .slider:before { transform: translateX(16px); }

        /* 模式隐藏逻辑 */
        body.simple-mode #btn-toggle-right { display: none !important; }
        body.simple-mode #sidebar-right { display: none !important; }
        body.simple-mode #dev-header-area { display: none !important; }
        body.simple-mode #simple-header-area { display: flex !important; }
        body:not(.simple-mode) #dev-header-area { display: flex !important; }
        body:not(.simple-mode) #simple-header-area { display: none !important; }

        @media (min-width: 901px) {
            body.simple-mode .app-container { grid-template-columns: 260px minmax(0, 1fr) 0px !important; }
        }
        
        /* 💡 保底防御：防止未引用的卡片样式崩塌 */
        .ai-interaction-card { box-sizing: border-box; width: 100%; overflow: hidden; }
        .ai-interaction-card .card-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    </style>

    <script>
        window.addEventListener('error', function(e) {
            if (e.message && (e.message.includes('id of null') || e.message.includes('fetch'))) {
                console.error("🚨 [Watchdog] 捕获到前端死锁或网络断裂:", e.message);
                setTimeout(() => {
                    if (!document.querySelector('.message-row') && !document.getElementById('chat-input')) {
                        console.warn("🕵️ [Watchdog] 确认系统卡死，正在强制清空导致死锁的缓存并重启...");
                        localStorage.removeItem('factory_last_domain');
                        localStorage.removeItem('last_valid_chat_id');
                        location.href = '/';
                    }
                }, 3000);
            }
        });
    </script>

【最高工作流锻造法则】
你是一个高级系统架构师（管家）。请根据厂长（用户）的需求，动态生成一个最优的工作流执行计划。

【执行逻辑：1.回答汇报 -> 2.写工作流草案 -> 3.提交系统挂载】
请你先用自然语言向厂长简单汇报你的设计思路和节点分配计划。
随后，你必须在回答的最后部分，输出且仅输出一个合法的 JSON 代码块 (```json ... ```)，系统底层会自动将其转化为厂长的审批卡片。

【💥 致命错误防御守则 (严格遵守)】
1. 算力指派不能空：每个节点的 `selectedAIs` 数组必须填入系统分配给你的真实【模型ID】！绝对不能留空（不能是 []）！
2. 指令不能空：`instruction` 必须详细写明该节点具体要执行的提示词！
3. 防并发雪崩：如果要顺次执行重型任务，必须给后续节点设置递增的 `delay_seconds`！例如：节点1延时0，节点2延时15，节点3延时30... 错峰执行才能保护系统！

必须绝对符合以下工作流骨架：
{
  "name": "自动生成的工作流名称",
  "nodes": [
    {
      "id": "唯一节点ID (如 n_1)",
      "type": "节点类型 (主干必须填 major, 向下并行的分支必须填 sub)",

      "delay_seconds": 0, 
      "requiresReview": false,
      "is_dispatcher": false,
      "is_loop_trigger": false,
      "selectedAIs": ["此处必须填入模型ID"] 
    }
  ],
  "edges": [
    { "source": "源节点ID", "target": "目标节点ID", "type": "major 或 sub" }
  ]
}
注意：请绝对不要把属性包裹在 "data" 里面！全部放在 node 的同级根目录下！

    <script>
        // Ouroboros 核心 JS 逻辑 (主控制台版)
        let obContext = { workflowId: null, nodeId: null, machineId: null, sessionId: null, patch: null };
        function triggerOuroborosProtocol(workflowId, errorData) {
            obContext = { workflowId: workflowId, nodeId: errorData.node_id, machineId: errorData.machine_id, sessionId: errorData.session_id, patch: null };
            document.getElementById('ob-node-id').innerText = errorData.node_id || '未知';
            document.getElementById('ob-machine-id').innerText = errorData.machine_id || '未知';
            document.getElementById('ob-session-id').innerText = errorData.session_id || '未知';
            document.getElementById('ob-console-output').innerHTML = `<span style="color:#ff6b6b;">${errorData.message}</span><br><br>系统已锁定案发现场快照，随时可进行深度自检。`;
            document.getElementById('ob-btn-diagnose').style.display = 'block';
            document.getElementById('ob-btn-diagnose').disabled = false;
            document.getElementById('ob-btn-apply').style.display = 'none';
            document.getElementById('ouroborosModal').style.display = 'flex';
        }
        function closeOuroborosModal() { document.getElementById('ouroborosModal').style.display = 'none'; }

        async function startAutonomousHealing() {
            const consoleOut = document.getElementById('ob-console-output');
            const btnDiag = document.getElementById('ob-btn-diagnose');
            btnDiag.disabled = true;
            try {
                consoleOut.innerHTML = "<span style='color:#a8c7fa;'>[1/3] 正在全域雷达中搜寻可用算力节点...</span><br>";
                const aiRes = await fetch('/api/config/ai');
                const aiData = await aiRes.json();
                
                let allNodes = [];
                if (aiData.categories) {
                    aiData.categories.forEach(cat => cat.nodes.forEach(n => { if (n.enabled !== false && n.key) allNodes.push(n); }));
                } else if (aiData.vendors) {
                    allNodes = aiData.vendors.filter(n => n.enabled !== false && n.key);
                }

                if (allNodes.length === 0) throw new Error("全域静默，未找到任何通电且配置了 Token 的可用算力节点！");

                // 💡 CLI 优先法则：强行让 CLI 节点优先担任诊断师！
                allNodes.sort((a, b) => {
                    const aIsCli = a.exec_mode === 'cli';
                    const bIsCli = b.exec_mode === 'cli';
                    if (aIsCli && !bIsCli) return -1;
                    if (!aIsCli && bIsCli) return 1;
                    return 0;
                });

                // 选定排在第一顺位的最高优节点
                let chiefPhysician = allNodes[0];
                const modeStr = chiefPhysician.exec_mode === 'cli' ? '💻 物理机床' : '🌐 云端架构师';
                consoleOut.innerHTML += `<span style='color:#20c997;'>锁定首席诊断师：[${modeStr}] ${chiefPhysician.name}。</span><br><br>`;

                consoleOut.innerHTML += "<span style='color:#a8c7fa;'>[2/3] 正在穿透读取容器崩溃前遥测快照...</span><br>";
                const logRes = await fetch(`/api/diagnostics/logs/${obContext.sessionId}`);
                if(!logRes.ok) throw new Error("无法读取该任务底层快照。");
                const logData = await logRes.json();
                
                // 🛡️ V20 衔尾蛇降级瘦身：绝不把几十万 Token 的死锁历史全喂给诊断师
                let chatHistoryStr = JSON.stringify(logData.history, null, 2);
                if (chatHistoryStr.length > 3500) {
                    chatHistoryStr = "【⚠️ Ouroboros 警告：历史记录过长，系统已触发物理截断，仅保留案发最后现场】\n...\n" + chatHistoryStr.slice(-3500);
                }
                
                consoleOut.innerHTML += `<span style='color:#20c997;'>快照提取成功，已剔除冗余干扰。</span><br><br>`;

                consoleOut.innerHTML += "<span style='color:#d8b4fe;'>[3/3] 诊断师正在分析故障，现场搓写赛博镣铐...</span><br>";
                const sysPrompt = `你是一个顶级安全架构师与系统诊断师。分析下方失败的任务对话快照，找出导致失败的逻辑缺陷。然后生成一个修补用的JSON，提炼出新的 Rule (红线) 或 SOP。
【绝对强制】：只输出JSON，格式如下：
{
  "analysis": "【自检报告】：发现问题...",
  "proposed_dnas": [
    { "id": "大写英文ID", "type": "rule或sop或identity", "name": "带Emoji中文名", "content": "内容..." }
  ],
  "requires_new_preset": false,
  "new_preset_id": null
}`;
                const res = await fetch(chiefPhysician.url, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${chiefPhysician.key}` },
                    body: JSON.stringify({ model: chiefPhysician.name, messages: [{ role: "system", content: sysPrompt }, { role: "user", content: `【现场遥测快照】：\n${chatHistoryStr}` }], temperature: 0.1 })
                });

                if(!res.ok) throw new Error("诊断师请求失败");
                const data = await res.json();
                const reply = data.choices[0].message.content.trim();
                const match = reply.match(/\{[\s\S]*\}/);
                if (!match) throw new Error("未返回合法 JSON。");
                obContext.patch = JSON.parse(match[0]);
                consoleOut.innerHTML = `
                    <div style="color:#ff6b6b; font-size:1rem; margin-bottom:10px;">📋 诊断结论：</div>
                    <div style="color:#eee; margin-bottom:20px; border-left:3px solid #ff6b6b; padding-left:10px;">${obContext.patch.analysis}</div>
                    <div style="color:#20c997; font-size:1rem; margin-bottom:10px;">💉 提炼抗体：</div>
                    ${obContext.patch.proposed_dnas.map(dna => `<div style="background:rgba(32,201,151,0.1); padding:8px; border-left:3px solid #20c997; margin-bottom:5px;"><b>[${dna.id}]</b> ${dna.name}</div>`).join('')}
                    ${obContext.patch.requires_new_preset ? `<div style="color:#a8c7fa; margin-top:10px;">🔄 建议替换机床出厂预设为：${obContext.patch.new_preset_id}</div>` : ''}
                `;
                btnDiag.style.display = 'none';
                document.getElementById('ob-btn-apply').style.display = 'block';
            } catch (error) {
                consoleOut.innerHTML += `<br><span style='color:#ff6b6b;'>❌ 诊断中断：${error.message}</span>`;
                btnDiag.disabled = false;
            }
        }

        async function applyGeneratedPatch() {
            const btnApply = document.getElementById('ob-btn-apply');
            const consoleOut = document.getElementById('ob-console-output');
            btnApply.disabled = true; btnApply.innerText = "⏳ 正在热更新全域配置...";
            try {
                const payload = {
                    workflow_id: obContext.workflowId, node_id: obContext.nodeId,
                    target_machine_id: obContext.machineId, new_dnas: obContext.patch.proposed_dnas,
                    new_preset_id: obContext.patch.new_preset_id
                };
                const res = await fetch('/api/workflow/auto_patch', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if(!res.ok) throw new Error("后端注射泵拒绝了热更新请求。");
                consoleOut.innerHTML = `<h2 style="color:#20c997; text-align:center; margin-top:20px;">✅ 基因重组完成，机床已恢复免疫力！</h2>`;
                setTimeout(() => { closeOuroborosModal(); if(typeof window.pollWorkflowStatus === 'function') window.pollWorkflowStatus(); }, 2000);
            } catch (e) {
                consoleOut.innerHTML += `<br><span style='color:#ff6b6b;'>❌ 热更新失败：${e.message}</span>`;
                btnApply.disabled = false; btnApply.innerText = "💉 确认落盘并热更新流水线";
            }
        }
    </script>

    <script>
        function setUIMode(mode) {
            if(mode === 'simple') {
                document.body.classList.add('simple-mode');
                document.getElementById('btn-mode-simple').classList.add('active');
                document.getElementById('btn-mode-dev').classList.remove('active');
                loadSimpleWorkflows();
            } else {
                document.body.classList.remove('simple-mode');
                document.getElementById('btn-mode-dev').classList.add('active');
                document.getElementById('btn-mode-simple').classList.remove('active');
            }
            document.getElementById('mode-modal').style.display = 'none';
            localStorage.setItem('butler_ui_mode', mode);
            
            window.dispatchEvent(new Event('uiModeChanged'));
        }

        async function loadSimpleWorkflows() {
            try {
                const res = await fetch('/api/config/workflows');
                const templates = await res.json();
                const sel = document.getElementById('simple-wf-selector');
                
                sel.innerHTML = '<option value="">纯净聊天模式</option>';
                window._cachedWorkflows = templates; 

                const currentEnv = window.currentDomain || 'factory_dev';
                for (const id in templates) {
                    const wf = templates[id];
                    const wfDomain = wf.domain_id || (wf.data && wf.data.domain_id) || 'factory_dev';
                    
                    if (wfDomain === currentEnv) {
                        const opt = document.createElement('option');
                        opt.value = id;
                        opt.text = wf.name;
                        sel.appendChild(opt);
                    }
                }
            } catch (e) { console.error("加载简易工作流失败", e); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedMode = localStorage.getItem('butler_ui_mode') || 'simple';
            setUIMode(savedMode);

            document.getElementById('simple-wf-selector').addEventListener('change', async (e) => {
                const wfId = e.target.value;
                if (!wfId) {
                    if (typeof window.stopWorkflow === 'function') window.stopWorkflow();
                } else {
                    if (window._cachedWorkflows && window._cachedWorkflows[wfId]) {
                        if (typeof window.selectAndLockWorkflow === 'function') {
                            await window.selectAndLockWorkflow(wfId, window._cachedWorkflows[wfId]);
                        }
                    }
                }
            });
        });
    </script>
